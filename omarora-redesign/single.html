{{ define "main" }}

<article class="post">
  <header>
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      {{ if .Date }}{{ .Date.Format "2 January 2006" }}{{ end -}}
      {{ if .Params.tags }}
        &ensp;·&ensp;
        {{ range .Params.tags }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}">{{ . }}</a>&thinsp;
        {{ end }}
      {{ end }}
    </p>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>

{{ end }}
